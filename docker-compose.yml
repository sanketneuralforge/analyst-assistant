services:

  # ── Agent core API ──────────────────────────────────────────────
  api:
    build: .
    command:
      - uv
      - run
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env                          # injects GROQ_API_KEY
    volumes:
      - ./db:/app/db                  # SQLite + ChromaDB — persisted on host
      - ./auth:/app/auth              # users.json — persisted on host
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit UI ────────────────────────────────────────────────
  ui:
    build: .
    command:
      - uv
      - run
      - streamlit
      - run
      - ui/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Streamlit reaches the API via Docker's internal network
      ANALYST_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy  # waits for /health to pass
    volumes:
      - ./auth:/app/auth
    restart: unless-stopped
